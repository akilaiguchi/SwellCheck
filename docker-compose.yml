services:
  db:
    image: mysql:8.0
    container_name: swellcheck_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: swellcheck
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init_db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build: ./api
    container_name: swellcheck_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - ./shared:/shared
    env_file: .env
    environment:
      - DATABASE_URL=mysql+mysqlconnector://${DB_USER}:${DB_PASSWORD}@db/swellcheck
      - PYTHONPATH=/app:/

  scraper:
    build: ./scraper
    container_name: swellcheck_scraper
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./scraper:/app
      - ./shared:/shared
    env_file: .env
    environment:
      - DATABASE_URL=mysql+mysqlconnector://${DB_USER}:${DB_PASSWORD}@db/swellcheck
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app:/
    restart: always

  bot:
    build: ./bot
    container_name: swellcheck_bot
    depends_on:
      - api
    volumes:
      - ./bot:/app
    env_file: .env
    environment:
      - API_BASE_URL=http://api:8000
    restart: always

  redis:
    image: redis:7-alpine
    container_name: swellcheck_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  mysql_data:
  redis_data:
